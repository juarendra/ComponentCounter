name: Build & Release APK

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'

permissions:
  contents: write
  actions: write

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.new_version }}
      is_major: ${{ steps.version.outputs.is_major }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: version
        run: |
          # Get last commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)

          # Read current version from version file or default to 1.0.0
          if [ -f version.txt ]; then
            CURRENT=$(cat version.txt)
          else
            CURRENT="1.0.0"
            echo "$CURRENT" > version.txt
          fi

          # Parse semver
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          # Bump based on conventional commits
          if echo "$COMMIT_MSG" | grep -qiE '^BREAKING CHANGE|^feat!:|^fix!:|^refactor!:'; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            echo "is_major=true" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qiE '^feat[(:]'; then
            MINOR=$((MINOR + 1))
            PATCH=0
            echo "is_major=false" >> $GITHUB_OUTPUT
          else
            PATCH=$((PATCH + 1))
            echo "is_major=false" >> $GITHUB_OUTPUT
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW_VERSION" > version.txt
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Version: $CURRENT → $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git commit -m "chore: bump version to $(cat version.txt)" || true
          git push || true

  build:
    name: Build APK
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull version update
        run: git pull origin main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Run lint
        run: ./gradlew lint --no-daemon
        continue-on-error: true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ComponentCounter-debug-${{ needs.version.outputs.version }}
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: ComponentCounter-release-${{ needs.version.outputs.version }}
          path: app/build/outputs/apk/release/app-release-unsigned.apk

  release:
    name: Create GitHub Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: ComponentCounter-debug-${{ needs.version.outputs.version }}
          path: artifacts/

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: ComponentCounter-release-${{ needs.version.outputs.version }}
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: ComponentCounter v${{ needs.version.outputs.version }}
          body: |
            ## ComponentCounter v${{ needs.version.outputs.version }}

            Automated release triggered by push to `main`.

            ### APKs
            - `app-debug.apk` — Debug build for testing
            - `app-release-unsigned.apk` — Release build (unsigned)

            ### Changes
            See [commit history](https://github.com/juarendra/ComponentCounter/commits/main)
          files: |
            artifacts/app-debug.apk
            artifacts/app-release-unsigned.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
