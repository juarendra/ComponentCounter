name: Build & Release APK

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'

permissions:
  contents: write
  actions: write

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: version
        run: |
          # Source of truth = latest semver tag, so versions are always monotonic
          # even if version.txt drifts. version.txt is informational only.
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -1)
          if [ -n "$LATEST_TAG" ]; then
            CURRENT="${LATEST_TAG#v}"
          elif [ -f version.txt ]; then
            CURRENT=$(cat version.txt)
          else
            CURRENT="1.0.0"
          fi

          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qiE '^BREAKING CHANGE|^feat!:|^fix!:|^refactor!:'; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$COMMIT_MSG" | grep -qiE '^feat[(:]'; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Version: ${CURRENT} -> ${NEW_VERSION} (latest tag: ${LATEST_TAG:-none})"

  build:
    name: Build & Sign APK
    needs: version
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
      APP_VERSION_CODE: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > app/release_keystore.jks
            echo "Keystore decoded successfully"
          else
            echo "No KEYSTORE_BASE64 secret found — using debug signing"
          fi

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build signed release APK
        env:
          STORE_FILE: ${{ secrets.STORE_FILE || 'release_keystore.jks' }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename release APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/ComponentCounter-v${{ needs.version.outputs.version }}.apk

      - name: Run lint
        run: ./gradlew lint --no-daemon
        continue-on-error: true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ComponentCounter-debug-${{ needs.version.outputs.version }}
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: ComponentCounter-release-${{ needs.version.outputs.version }}
          path: app/build/outputs/apk/release/ComponentCounter-v${{ needs.version.outputs.version }}.apk

  release:
    name: Create GitHub Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: ComponentCounter-debug-${{ needs.version.outputs.version }}
          path: artifacts/

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: ComponentCounter-release-${{ needs.version.outputs.version }}
          path: artifacts/

      - name: Generate release notes
        id: notes
        run: |
          chmod +x .github/scripts/generate-release-notes.sh
          PREV_TAG=$(git tag --sort=-creatordate | head -1 || echo "none")
          NOTES=$(.github/scripts/generate-release-notes.sh "$PREV_TAG" HEAD)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: ComponentCounter v${{ needs.version.outputs.version }}
          body: |
            ## ComponentCounter v${{ needs.version.outputs.version }}

            Automated release triggered by push to `main`.

            ### APKs
            - `app-debug.apk` — Debug build for testing
            - `ComponentCounter-v${{ needs.version.outputs.version }}.apk` — Signed release build

            ${{ steps.notes.outputs.notes }}
          files: |
            artifacts/app-debug.apk
            artifacts/ComponentCounter-v${{ needs.version.outputs.version }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
