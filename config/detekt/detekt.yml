# Component Counter detekt config
# See: https://detekt.dev/docs/introduction/configurations

build:
  maxIssues: 100

style:
  active: true
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludes: ['**/test/**', '**/androidTest/**']
  WildcardImport:
    active: true
    excludes: ['**/test/**', '**/androidTest/**']
  MagicNumber:
    active: true
    excludes: ['**/test/**', '**/androidTest/**', '**/theme/**']
  UnusedImports:
    active: true
  UnusedPrivateMember:
    active: true
  ForbiddenComment:
    active: true
    values: ['TODO:', 'FIXME:', 'STOPSHIP:']

complexity:
  active: true
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 20
  LongMethod:
    active: true
    threshold: 80
  LargeClass:
    active: true
    threshold: 600
  ComplexCondition:
    active: true
    threshold: 5
  CognitiveComplexMethod:
    active: true
    threshold: 20

potential-bugs:
  active: true
  DuplicateCaseInWhenExpression:
    active: true
  MissingWhenCase:
    active: true
    excludes: ['**/test/**', '**/androidTest/**']
  UnreachableCode:
    active: true
  UnsafeCallOnNullableType:
    active: true

# NOTE: the `formatting` ruleset requires the detekt-formatting plugin
# (io.gitlab.arturbosch.detekt:detekt-formatting), which is not applied here.
# Leaving it configured makes detekt fail to load its config ("Property
# 'formatting' is misspelled or does not exist"). Removed to keep CI green;
# re-add the block together with the detektPlugins dependency if formatting
# checks are wanted.

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
    excludes: ['**/ml/**']  # TFLite throws generic Exception
  TooGenericExceptionThrown:
    active: true
